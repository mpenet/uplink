worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict ladon_cache     10m;
    lua_shared_dict ladon_metrics    2m;
    lua_shared_dict ladon_config     1m;
    lua_shared_dict ladon_circuit    1m;
    lua_shared_dict ladon_ratelimit  1m;

    lua_package_path "$prefixlib/?.lua;;";

    # Load config, store in shared dict, build initial route table.
    init_by_lua_block {
        local config_mod = require("config")
        local prefix = ngx.config.prefix()
        local cfg = config_mod.load(prefix .. "config.json")
        config_mod["store-in-shared"](cfg)
    }

    # Pre-warm schemas and start per-service background refresh timers.
    init_worker_by_lua_block {
        local config_mod = require("config")
        local refresh = require("refresh")
        local cfg = config_mod["load-from-shared"]()
        refresh["init-worker"](cfg)
    }

    server {
        listen 8080;
        server_name _;

        # Aggregated OpenAPI schema.
        location = /openapi.json {
            default_type application/json;
            content_by_lua_block {
                local aggregator = require("aggregator")
                aggregator.handle()
            }
        }

        # Prometheus metrics.
        location = /metrics {
            default_type text/plain;
            content_by_lua_block {
                local metrics = require("metrics")
                ngx.say(metrics.render())
            }
        }

        # Hot-reload: re-read config.json, bump version, workers pick it up lazily.
        # Restricted to loopback — not intended to be externally reachable.
        location = /reload {
            default_type application/json;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            content_by_lua_block {
                if ngx.req.get_method() ~= "POST" then
                    ngx.status = 405
                    ngx.say('{"error":"method not allowed"}')
                    return
                end
                local config_mod = require("config")
                local prefix = ngx.config.prefix()
                local ok, result = pcall(config_mod["reload"], prefix .. "config.json")
                if ok then
                    ngx.say('{"ok":true,"version":' .. result.version .. '}')
                else
                    ngx.status = 500
                    ngx.say('{"error":' .. require("cjson").encode(result) .. '}')
                end
            }
        }

        # Health check.
        location = /healthz {
            default_type application/json;
            content_by_lua_block {
                ngx.say('{"status":"ok"}')
            }
        }

        # All other requests: match service prefix and proxy upstream.
        location / {
            content_by_lua_block {
                local proxy = require("proxy")
                proxy.handle()
            }
        }
    }
}
