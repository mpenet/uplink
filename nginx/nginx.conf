worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict uplink_cache     10m;
    lua_shared_dict uplink_metrics    2m;
    lua_shared_dict uplink_config     1m;
    lua_shared_dict uplink_circuit    1m;
    lua_shared_dict uplink_ratelimit  1m;
    # Uncomment to enable OpenTelemetry span export (also set "otel" in config.json).
    # lua_shared_dict uplink_otel      2m;

    lua_package_path "$prefix/lib/?.lua;;";
    lua_code_cache on;

    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"service":"$svc_name",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"query":"$args",'
            '"status":$status,'
            '"upstream_time":"$upstream_response_time",'
            '"bytes":$body_bytes_sent,'
            '"traceparent":"$traceparent",'
            '"request_id":"$request_id",'
            '"remote_addr":"$remote_addr",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    init_by_lua_block {
        local config_mod = require("config")
        local prefix = ngx.config.prefix()
        local cfg = config_mod.load(prefix .. "config.json")
        config_mod["store-in-shared"](cfg)
    }

    init_worker_by_lua_block {
        local cfg = require("config")["load-from-shared"]()
        require("refresh")["init-worker"](cfg)
        require("otel")["init-worker"](cfg)
    }

    # Per-service upstream pools — generated by generate.fnl from config.json.
    include nginx/upstreams.conf;

    server {
        # listen directives (and TLS/mTLS directives when server.tls is set)
        # are generated by generate.fnl into nginx/listen.conf.
        include nginx/listen.conf;
        server_name _;

        access_log logs/access.log json_access;

        # Declare all variables written by router.fnl so nginx registers them.
        set $svc_name             "";
        set $upstream_path        "";
        set $upstream_host_header "";
        set $traceparent          "";

        # Forwarded upstream headers — inherited by all proxy_pass locations
        # that define no proxy_set_header of their own.
        proxy_http_version 1.1;
        proxy_set_header Connection            "";
        proxy_set_header Host                  $upstream_host_header;
        proxy_set_header traceparent           $traceparent;
        proxy_set_header X-Request-ID          $request_id;
        proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto     $scheme;

        # Retry on connection-level failures (not HTTP errors — single-server
        # upstreams have no peer to retry to for 5xx; circuit breaker handles that).
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 2;

        location = /openapi.json {
            default_type application/json;
            content_by_lua_block { require("aggregator").handle() }
        }

        location = /metrics {
            default_type text/plain;
            content_by_lua_block {
                ngx.header["Content-Type"] = "text/plain; version=0.0.4"
                ngx.say(require("metrics").render())
            }
        }

        # Hot-reload application config (rate limits, circuit thresholds, schema rules).
        # Routing/TLS/timeout changes require nginx reload (generate.fnl + nginx -s reload).
        location = /reload {
            default_type application/json;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            content_by_lua_block {
                if ngx.req.get_method() ~= "POST" then
                    ngx.status = 405
                    ngx.say('{"error":"method not allowed"}')
                    return
                end
                local config_mod = require("config")
                local prefix = ngx.config.prefix()
                local ok, result = pcall(config_mod["reload"], prefix .. "config.json")
                if ok then
                    ngx.say('{"ok":true,"version":' .. result.version .. '}')
                else
                    ngx.status = 500
                    ngx.say('{"error":' .. require("cjson").encode(result) .. '}')
                end
            }
        }

        location = /healthz {
            default_type application/json;
            content_by_lua_block { ngx.say('{"status":"ok"}') }
        }

        # Per-service proxy_pass locations — generated by generate.fnl.
        include nginx/locations.conf;

        location / {
            default_type application/json;
            return 404 '{"error":"no service matched"}';
        }
    }
}
